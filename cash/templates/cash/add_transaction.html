{% extends 'base.html' %}

{% block title %}Add Transaction - CashFlow{% endblock %}

{% block content %}
<div class="dashboard-header" style="margin-bottom: 2rem;">
    <h1>Add New Transaction</h1>
    <p style="color: var(--text-muted);">Record your income or expenses to keep your balance accurate.</p>
</div>

<div style="max-width: 700px;">
    <div class="glass-card">
        <form method="POST">
            {% csrf_token %}
            <div>
                <label>Title / Item Name</label>
                <input type="text" name="title" placeholder="e.g. Lunch, Grocery, Salary" required>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div>
                    <label>Amount (৳)</label>
                    <input type="number" step="0.01" name="amount" required>
                </div>
                <div>
                    <label>Type</label>
                    <select name="transaction_type" required>
                        <option value="EXPENSE">Expense</option>
                        <option value="INCOME">Income</option>
                    </select>
                </div>
            </div>

            <div>
                <label>Category</label>
                <select name="category">
                    <option value="OTHER">Other</option>
                    <option value="FOOD">Food</option>
                    <option value="TRANSPORT">Transport</option>
                    <option value="RENT">Rent</option>
                    <option value="UTILITIES">Utilities</option>
                    <option value="SHOPPING">Shopping</option>
                    <option value="SALARY">Salary</option>
                    <option value="INVESTMENT">Investment</option>
                    <option value="HEALTH">Health</option>
                    <option value="EDUCATION">Education</option>
                    <option value="ENTERTAINMENT">Entertainment</option>
                </select>
            </div>

            <div>
                <label>Location (Optional)</label>
                <input type="text" name="location" placeholder="e.g. Uttara, Dhanmondi">
            </div>

            <div>
                <label>Description (Optional)</label>
                <textarea name="description" rows="3"></textarea>
            </div>

            <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                <button type="submit" class="btn btn-primary" style="flex: 1;">Save Transaction</button>
                <a href="{% url 'dashboard' %}" class="btn" style="flex: 1; text-align: center; border: 1px solid var(--glass-border); text-decoration: none; color: white;">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
