{% extends 'base.html' %}

{% block title %}Add Transaction - CashFlow{% endblock %}

{% block content %}
<div class="dashboard-header" style="margin-bottom: 2rem;">
    <h1>Add New Transaction</h1>
    <p style="color: var(--text-muted);">Record your income or expenses to keep your balances accurate.</p>
</div>

<div style="max-width: 700px;">
    <div class="glass-card">
        <form method="POST">
            {% csrf_token %}
            <div style="margin-bottom: 1.5rem;">
                <label>Transaction Title</label>
                <input type="text" name="title" placeholder="e.g. Lunch with friends" required>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem;">
                <div>
                    <label>Amount (৳)</label>
                    <input type="number" step="0.01" name="amount" required>
                </div>
                <div>
                    <label>Transaction Type</label>
                    <select name="transaction_type">
                        <option value="EXPENSE" {% if request.GET.type == 'EXPENSE' %}selected{% endif %}>Expense</option>
                        <option value="INCOME" {% if request.GET.type == 'INCOME' %}selected{% endif %}>Income</option>
                    </select>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem;">
                <div>
                    <label>Select Account (Wallet)</label>
                    <select name="wallet" required>
                        {% for w in user.wallets.all %}
                        <option value="{{ w.id }}">{{ w.name }} (৳{{ w.balance }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label>Category</label>
                    <select name="category">
                        <option value="FOOD" {% if request.GET.cat == 'FOOD' %}selected{% endif %}>Food</option>
                        <option value="TRANSPORT" {% if request.GET.cat == 'TRANSPORT' %}selected{% endif %}>Transport</option>
                        <option value="RENT" {% if request.GET.cat == 'RENT' %}selected{% endif %}>Rent</option>
                        <option value="UTILITIES" {% if request.GET.cat == 'UTILITIES' %}selected{% endif %}>Utilities</option>
                        <option value="SHOPPING" {% if request.GET.cat == 'SHOPPING' %}selected{% endif %}>Shopping</option>
                        <option value="SALARY" {% if request.GET.cat == 'SALARY' %}selected{% endif %}>Salary</option>
                        <option value="INVESTMENT" {% if request.GET.cat == 'INVESTMENT' %}selected{% endif %}>Investment</option>
                        <option value="HEALTH" {% if request.GET.cat == 'HEALTH' %}selected{% endif %}>Health</option>
                        <option value="EDUCATION" {% if request.GET.cat == 'EDUCATION' %}selected{% endif %}>Education</option>
                        <option value="ENTERTAINMENT" {% if request.GET.cat == 'ENTERTAINMENT' %}selected{% endif %}>Entertainment</option>
                        <option value="OTHER" {% if request.GET.cat == 'OTHER' %}selected{% endif %}>Other</option>
                    </select>
                </div>
            </div>

            <div style="margin-bottom: 1.5rem;">
                <label>Location (Optional)</label>
                <input type="text" name="location" placeholder="e.g. Dhanmondi, Dhaka">
            </div>

            <div style="margin-bottom: 2rem;">
                <label>Description (Optional)</label>
                <textarea name="description" rows="3" placeholder="Additional details..."></textarea>
            </div>

            <div style="display: flex; gap: 1rem;">
                <button type="submit" class="btn btn-primary">Save Transaction</button>
                <a href="{% url 'dashboard' %}" class="btn" style="border: 1px solid var(--border); background: transparent; color: white;">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
