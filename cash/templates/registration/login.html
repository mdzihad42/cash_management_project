{% extends 'base.html' %}

{% block title %}Login - CashFlow{% endblock %}

{% block auth_content %}
<div class="glass-card auth-card" style="width: 100%; max-width: 400px;">
    <h2 style="margin-bottom: 0.5rem; text-align: center; font-family: 'Outfit';">Welcome Back</h2>
    <p style="color: var(--text-muted); text-align: center; font-size: 0.875rem; margin-bottom: 2rem;">Log in to manage your cash flow</p>
    <form method="POST">
            {% csrf_token %}
            <div>
                <label>Username</label>
                {{ form.username }}
            </div>
            <div>
                <label>Password</label>
                {{ form.password }}
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Login</button>
        </form>
        <p style="margin-top: 1.5rem; text-align: center; color: var(--text-muted);">
            Don't have an account? <a href="{% url 'register' %}" style="color: var(--primary);">Register</a>
        </p>
    </div>
</div>
{% endblock %}
